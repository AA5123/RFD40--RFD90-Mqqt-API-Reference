title: certDetails
x-stoplight:
  id: 0114c36cfa592
type: object
examples: []
properties:
  name:
    type: string
    example: sotiAgent
    description: 'A logical name for the certificate entry, typically representing the application, service, or agent.'
  type:
    type: string
    example: client
    enum:
      - client
      - server
      - mqtt
      - wifi
      - filestore
    description: Certificate category that identifies where the certificate is used.
  authenticationType:
    type: string
    enum:
      - NONE
      - BASIC
      - TOKEN
      - CERTIFICATE
    example: BASIC
    description: |-
      Specifies the authentication method used to access the remote certificate source.
      - `NONE`: No authentication is used.
      - `BASIC`: HTTP Basic authentication using username and password. In this case, `authenticateOptions` is required.
      - `TOKEN`: Token-based authentication. This option is currently not supported.
      - `CERTIFICATE`: Certificate-based authentication used to download or retrieve certificates.
  certSource:
    type: string
    enum:
      - HTTP
      - DIRECT
    example: HTTP
    description: |-
      Specifies how certificate content is supplied for installation. This field is optional.
      If omitted, the default behavior is `HTTP`, and the device attempts to download certificate content from the URLs provided in `url`.
      - `DIRECT`: Certificate content is provided inline in `certificateBundle`.
      - `HTTP`: Certificate content is downloaded from remote URLs in `url`.
      For `HTTP` with `authenticationType` set to `CERTIFICATE`, authentication can use inline certificate content in `caCertificateFileContent` or an already installed filestore certificate.
  url:
    type: array
    description: A list of key-value entries that map certificate components to downloadable URLs.
    items:
      type: object
      properties:
        key:
          type: string
          description: The certificate component identifier.
          enum:
            - ca_cert
            - client_key
            - client_cert
            - cert_key_password
        value:
          type: string
          description: 'The URL for the specified component. For `cert_key_password`, this is the key password value.'
  authenticateOptions:
    type: object
    description: Authentication options for credential-based access. Required when `authenticationType` is `BASIC`.
    properties:
      username:
        type: string
        example: rfid
        description: Username used for HTTP Basic authentication.
      password:
        type: string
        example: rfid
        description: Password used for HTTP Basic authentication.
  pfxPassword:
    type: string
    example: pass@123
    description: Password for the PFX (PKCS#12) bundle when a PFX certificate is provided. This field is currently not supported for RFD40/90.
  headerParams:
    type: array
    description: A list of key-value pairs representing HTTP header parameters. This field is currently not supported.
    items:
      type: object
      properties:
        key:
          type: string
          description: The key for the HTTP header parameter.
        value:
          type: string
          description: The value associated with the HTTP header parameter.
  queryParams:
    type: array
    description: A list of key-value pairs representing query parameters. This field is currently not supported.
    items:
      type: object
      properties:
        key:
          type: string
          description: The key for the query parameter.
        value:
          type: string
          description: The value associated with the query parameter.
  verificationType:
    type: string
    enum:
      - NONE
      - VERIFY_PEER
      - VERIFY_HOST
      - VERIFY_HOST_PEER
    example: NONE
    description: Specifies the TLS verification mode used when validating remote endpoints.
  certificateBundle:
    type: object
    description: |-
      Optional inline certificate payload used when `certSource` is `DIRECT`.
      Provide certificate content for one certificate `type`: `client`, `server`, `mqtt`, `wifi`, or `filestore`.
    properties:
      ca_cert:
        type: string
        description: 'Inline CA certificate content, typically in PEM or base64-encoded form.'
      client_key:
        type: string
        description: 'Inline client private key content, typically in PEM or base64-encoded form.'
      client_cert:
        type: string
        description: 'Inline client certificate content, typically in PEM or base64-encoded form.'
      cert_key_password:
        type: string
        description: 'Password used to decrypt an encrypted client private key, when required.'
  caCertificateFileContent:
    type: string
    description: |-
      Optional inline certificate content used only for remote certificate download authentication.
      - Not applicable when `certSource` is `DIRECT`.
      - Applicable only when `certSource` is `HTTP` and `authenticationType` is `CERTIFICATE`.
      - If applicable and this field is empty, the device uses an already installed filestore certificate for authentication.
required:
  - type
  - authenticationType
